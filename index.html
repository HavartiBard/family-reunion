<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelsall Family</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css?v=42" />
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast" hidden></div>
  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div id="modal-box" class="modal-box"></div>
  </div>
  <div id="lb-overlay" class="lb-overlay" hidden>
    <button class="lb-x" onclick="closeLightbox()">✕</button>
    <div class="lb-layout">
      <div class="lb-img-area">
        <button id="lb-prev" class="lb-arrow lb-arrow-left" onclick="lbStep(-1)">‹</button>
        <img id="lb-img" class="lb-image" src="" alt="">
        <button id="lb-next" class="lb-arrow lb-arrow-right" onclick="lbStep(1)">›</button>
      </div>
      <div class="lb-panel">
        <div id="lb-counter" class="lb-counter"></div>
        <div id="lb-caption" class="lb-meta-section"></div>
        <div id="lb-tags" class="lb-meta-section"></div>
        <div id="lb-comments" class="lb-comments-section"></div>
      </div>
    </div>
  </div>
  <script src="helpers.js?v=25"></script>
  <script src="merge.js?v=25"></script>
  <script src="app.js?v=51"></script>
</body>
</html>
