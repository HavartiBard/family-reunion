---
# Overlay: docker compose -f compose.yml -f compose.cloudflared.yml up -d
#
# The cloudflare/cloudflared image is distroless (no shell), so a tiny busybox
# init container materializes creds.json + config.yml into a shared volume from
# env, then cloudflared runs reading them. Keeps a locally-managed tunnel
# (ingress defined here, not in the Cloudflare dashboard) and stays fully
# env-driven — no host-specific files to pre-place.
services:
  cloudflared-init:
    image: busybox:latest
    container_name: ${CF_CONTAINER:-cloudflared-reunion}-init
    restart: "no"
    environment:
      - CF_ACCOUNT_TAG
      - CF_TUNNEL_SECRET
      - CF_TUNNEL_ID
      - API_HOSTNAME
    volumes:
      - cf_config:/etc/cloudflared
    command:
      - sh
      - -c
      - |
        set -e
        cat > /etc/cloudflared/creds.json <<EOF
        {"AccountTag":"$${CF_ACCOUNT_TAG}","TunnelSecret":"$${CF_TUNNEL_SECRET}","TunnelID":"$${CF_TUNNEL_ID}"}
        EOF
        cat > /etc/cloudflared/config.yml <<EOF
        tunnel: $${CF_TUNNEL_ID}
        credentials-file: /etc/cloudflared/creds.json
        ingress:
          - hostname: $${API_HOSTNAME}
            service: http://pocketbase:8090
          - service: http_status:404
        EOF
        echo "cloudflared config materialized"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${CF_CONTAINER:-cloudflared-reunion}
    restart: unless-stopped
    depends_on:
      cloudflared-init:
        condition: service_completed_successfully
      pocketbase:
        condition: service_started
    volumes:
      - cf_config:/etc/cloudflared:ro
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run

volumes:
  cf_config:
