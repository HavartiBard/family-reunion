---
services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:${PB_VERSION:-0.22.20}
    container_name: ${PB_CONTAINER:-pocketbase-reunion}
    volumes:
      - ${PB_DATA_DIR:-./pb_data}:/pb_data
      - ./pb_migrations:/pb_migrations
    ports:
      - "${PB_PORT:-8094}:8090"
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8090/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
